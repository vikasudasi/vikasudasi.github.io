- date: 2026-07-20
  items:
    - title: "GPT-5.6 closes 30-year complexity gap in convex optimization"
      source: "ArXiv"
      url: "https://arxiv.org"
      summary: "A UC Berkeley researcher used GPT-5.6 Sol Pro with a structured prompt to produce a formally verified Lean proof for a quadratic lower bound in zeroth-order optimization -- open since 1996."
    - title: "Agent skills ecosystem hits 77K+ stars on GitHub"
      source: "GitHub Trending"
      url: "https://github.com/topics/agent-skills"
      summary: "The agent-skills repo by Addy Osmani gained 1,116 stars in a single day. Microsoft's SkillOpt paper shows skills can be auto-optimized for 2x accuracy."
    - title: "Moonshine AI speech recognition runs on 80-cent microcontroller"
      source: "Hacker News"
      url: "https://news.ycombinator.com"
      summary: "Moonshine AI's <500KB speech recognition + TTS model hit #3 on HN front page, running on an RP2350 microcontroller."
    - title: "Multi-model routing economy -- routing decision now worth more than model choice"
      source: "AI News"
      url: "https://venturebeat.com/ai"
      summary: "With 15+ viable models, the key optimization is routing the right task to the right model. Gemini Flash scores 97% at $0.003/run on suitable tasks."
- date: 2026-07-20
  items:
    - title: "Harness Engineering > Prompt Engineering — agent runtime is now the bottleneck"
      source: "AI Engineer World's Fair / Latent Space"
      url: "https://www.latent.space"
      summary: "AI Engineering in 2026 runs on Harnesses, Not Prompts. Grok Build (xAI) open-sourced its coding agent CLI. The question is no longer 'can the model reason?' but 'what is the harness allowed to do between user turns?'"
    - title: "Open-weight models now carry majority of production AI traffic"
      source: "TechCrunch"
      url: "https://techcrunch.com"
      summary: "OpenRouter's top 5 models are all open-weight. Chinese open-weight models account for 41% of HuggingFace downloads. Kimi K3 dropped as the largest open model ever — yet no tool exists to test models on your own prompts."
    - title: "Token cost crisis driving deterministic hybrid workflows"
      source: "ArXiv / Compiled AI paper"
      url: "https://arxiv.org/abs/2604.05150"
      summary: "The Compiled AI paper showed 57× token reduction by moving deterministic steps out of LLM calls. Developers need tools to profile their agent scripts and identify which LLM calls can be safely replaced."
